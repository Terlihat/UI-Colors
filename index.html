<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flat UI Colors</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <style>
        /* CSS Variables */
        :root {
            --bg-color: #f5f6fa; --header-bg: #2f3640; --header-text: #ffffff;
            --control-bg: #f5f6fa; --control-text: #2f3640; --control-hover: #dcdde1;
            --empty-text: #7f8fa6; --panel-bg: #ffffff; --panel-text: #2f3640; --panel-border: #dcdde1;
        }

        body.dark-mode {
            --bg-color: #1e272e; --header-bg: #111111; --header-text: #f5f6fa;
            --control-bg: #2f3640; --control-text: #f5f6fa; --control-hover: #485460;
            --empty-text: #808e9b; --panel-bg: #1e272e; --panel-text: #f5f6fa; --panel-border: #353b48;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body { background-color: var(--bg-color); display: flex; flex-direction: column; height: 100vh; overflow: hidden; transition: background-color 0.3s ease; }

        /* Navbar Layout */
        header { display: flex; justify-content: space-between; align-items: center; padding: 1rem 2rem; background-color: var(--header-bg); color: var(--header-text); box-shadow: 0 4px 6px rgba(0,0,0,0.2); z-index: 5; transition: background-color 0.3s ease; }
        .header-title h1 { font-size: 1.5rem; letter-spacing: 1px; display: flex; align-items: center; gap: 10px; }
        .header-title p { font-size: 0.75rem; color: #a4b0be; margin-top: 4px; }
        .version-badge { font-size: 0.75rem; background-color: #f1c40f; color: #2c3e50; padding: 2px 6px; border-radius: 4px; font-weight: bold; }

        .controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; justify-content: flex-end; }
        select, button { padding: 0.5rem 0.8rem; border-radius: 4px; border: none; outline: none; font-weight: bold; cursor: pointer; background-color: var(--control-bg); color: var(--control-text); transition: all 0.2s ease; font-size: 0.85rem; }
        select:hover, button:hover { background-color: var(--control-hover); }
        button:active { transform: scale(0.95); }

        button#export-css { background-color: #2ed573; color: white; } button#export-css:hover { background-color: #27ae60; }
        button#history-toggle { background-color: #3742fa; color: white; } button#history-toggle:hover { background-color: #5352ed; }
        button#eyedropper-btn { background-color: #ff4757; color: white; display: none; } button#eyedropper-btn:hover { background-color: #ff6b81; }
        
        button#gradient-toggle { background-color: #e056fd; color: white; border: 2px solid transparent; }
        button#gradient-toggle.active { background-color: #be2edd; border: 2px solid #fff; box-shadow: 0 0 10px rgba(190,46,221,0.5); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        /* Palette Grid */
        .palette { display: grid; grid-template-columns: repeat(auto-fit, minmax(20%, 1fr)); flex-grow: 1; width: 100%; overflow-y: auto; }
        .empty-favorites { grid-column: 1 / -1; display: flex; justify-content: center; align-items: center; font-size: 1.5rem; color: var(--empty-text); height: 100%; text-align: center; padding: 2rem; }

        /* Color Box */
        .color-box { display: flex; justify-content: center; align-items: center; cursor: pointer; position: relative; transition: background-color 0.3s ease; min-height: 150px; }
        .color-name { font-size: 1rem; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; opacity: 0; transition: opacity 0.3s ease; pointer-events: none; text-align: center; padding: 0 10px; }
        .color-box:hover .color-name { opacity: 1; }

        /* Tints Button */
        .tints-btn { position: absolute; top: 10px; right: 10px; background: rgba(255,255,255,0.3); border: none; color: #fff; padding: 5px 8px; border-radius: 4px; font-size: 0.8rem; cursor: pointer; opacity: 0; transition: opacity 0.2s ease, background 0.2s ease; font-weight: bold; }
        .color-box:hover .tints-btn { opacity: 1; }
        .tints-btn:hover { background: rgba(255,255,255,0.6); }
        .tints-btn.dark-btn { color: #333; background: rgba(0,0,0,0.1); } .tints-btn.dark-btn:hover { background: rgba(0,0,0,0.3); }

        .add-color-box { background-color: transparent; border: 3px dashed var(--empty-text); }
        .add-color-box .color-name { opacity: 1; color: var(--empty-text); }
        .add-color-box:hover { background-color: rgba(127, 143, 166, 0.1); }
        #custom-color-picker { opacity: 0; position: absolute; width: 100%; height: 100%; cursor: pointer; }

        /* Main Overlay */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 50; opacity: 0; pointer-events: none; transition: opacity 0.2s ease; }
        .overlay.show { opacity: 1; z-index: 9999; pointer-events: all; }
        .overlay h1 { font-size: 6rem; width: 100%; text-align: center; padding: 1rem 0; text-transform: uppercase; transform: scale(0.1); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .overlay-strip { background: rgba(255, 255, 255, 0.2); width: 100%; text-align: center; }
        .overlay-strip.dark-strip { background: rgba(0, 0, 0, 0.1); }
        .overlay.show h1 { transform: scale(1); }
        .overlay p { font-size: 2.5rem; margin-top: 1rem; font-weight: 500; text-align: center; max-width: 90%; word-break: break-all; }

        /* Gradient Result Modal */
        .gradient-result-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
        .gradient-result-modal.show { opacity: 1; pointer-events: all; }
        .gradient-code-box { background: rgba(0,0,0,0.7); color: white; padding: 2rem; border-radius: 12px; text-align: center; backdrop-filter: blur(10px); max-width: 80%; }
        .gradient-code-box h2 { font-size: 2rem; margin-bottom: 1rem; }
        .gradient-code-box code { font-size: 1.2rem; display: block; margin: 1rem 0; background: rgba(255,255,255,0.1); padding: 10px; border-radius: 6px; }
        .copy-grad-btn { background: #2ed573; color: white; padding: 10px 20px; font-size: 1.1rem; border-radius: 30px; border: none; cursor: pointer; font-weight: bold; margin-top: 1rem; }
        .copy-grad-btn:hover { background: #27ae60; }
        .close-grad-btn { position: absolute; top: 20px; right: 30px; font-size: 3rem; color: white; cursor: pointer; background: transparent; border: none; text-shadow: 0 2px 5px rgba(0,0,0,0.5); }

        /* History Panel */
        .history-panel { position: fixed; top: 0; right: -350px; width: 350px; height: 100vh; background-color: var(--panel-bg); color: var(--panel-text); box-shadow: -4px 0 15px rgba(0,0,0,0.1); z-index: 1000; transition: right 0.3s ease; display: flex; flex-direction: column; }
        .history-panel.open { right: 0; }
        .history-backdrop { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 999; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
        .history-backdrop.open { opacity: 1; pointer-events: all; }
        .history-header { display: flex; justify-content: space-between; align-items: center; padding: 1.5rem; border-bottom: 1px solid var(--panel-border); background-color: var(--header-bg); color: var(--header-text); }
        .close-btn { background: transparent; color: white; font-size: 1.5rem; padding: 0; } .close-btn:hover { color: #ff4757; }
        .history-list { flex-grow: 1; overflow-y: auto; padding: 1rem; }
        .history-item { display: flex; align-items: center; gap: 15px; padding: 10px; border-radius: 8px; margin-bottom: 10px; cursor: pointer; background-color: var(--control-bg); transition: transform 0.2s ease; }
        .history-item:hover { transform: translateY(-2px); box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .history-color-blob { width: 40px; height: 40px; border-radius: 50%; border: 2px solid rgba(0,0,0,0.1); }
        .history-val { font-weight: bold; font-size: 0.9rem; } .history-name { font-size: 0.75rem; color: var(--empty-text); }
        .clear-history-btn { margin: 1rem; padding: 0.8rem; background-color: #ff4757; color: white; text-align: center; border-radius: 4px; }

        /* Color Studio Modal */
        .shades-modal { position: fixed; top: 100%; left: 0; width: 100%; height: 100%; background: var(--bg-color); z-index: 2000; transition: top 0.4s cubic-bezier(0.175, 0.885, 0.32, 1); display: flex; flex-direction: column; overflow-y: auto; }
        .shades-modal.open { top: 0; }
        .shades-header { display: flex; justify-content: space-between; align-items: center; padding: 1rem 2rem; background: var(--header-bg); color: var(--header-text); position: sticky; top: 0; z-index: 10; }
        .shades-info { display: flex; flex-direction: column; gap: 5px;}
        .wcag-badge { padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; font-weight: bold; display: inline-block; } .wcag-pass { background: #2ed573; color: #2f3640; } .wcag-fail { background: #ff4757; color: white; }
        .studio-section-title { padding: 1.5rem 2rem 0.5rem; font-size: 1.2rem; color: var(--panel-text); border-bottom: 2px solid var(--panel-border); margin-bottom: 1rem; }
        .shades-container { display: grid; grid-template-columns: repeat(10, 1fr); min-height: 200px; width: 100%; }
        .harmonies-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; padding: 0 2rem 2rem; }
        .harmony-group { display: flex; flex-direction: column; gap: 10px; background: var(--panel-bg); padding: 1rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid var(--panel-border); }
        .harmony-group h3 { font-size: 0.9rem; color: var(--empty-text); text-transform: uppercase; letter-spacing: 1px; text-align: center; }
        .harmony-colors { display: flex; gap: 10px; height: 100px; }
        .harmony-box { flex: 1; border-radius: 6px; cursor: pointer; display: flex; justify-content: center; align-items: center; transition: transform 0.2s; position: relative; }
        .harmony-box:hover { transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .harmony-label { background: rgba(255,255,255,0.8); color: #000; padding: 2px 5px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; opacity: 0; transition: opacity 0.2s; pointer-events: none; }
        .harmony-box:hover .harmony-label { opacity: 1; }
        .shade-box { display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; position: relative; transition: transform 0.2s ease; }
        .shade-box:hover { transform: scale(1.05); z-index: 10; box-shadow: 0 0 15px rgba(0,0,0,0.3); }
        .shade-pct { font-size: 1.5rem; font-weight: bold; margin-bottom: 10px; } .shade-hex { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }

        @media (max-width: 900px) { header { flex-direction: column; gap: 1rem; text-align: center; } .controls { justify-content: center; } .palette { grid-template-columns: repeat(auto-fit, minmax(33.33%, 1fr)); } .shades-container { grid-template-columns: repeat(5, 1fr); } }
        @media (max-width: 600px) { .palette { grid-template-columns: repeat(auto-fit, minmax(50%, 1fr)); } .overlay h1 { font-size: 3.5rem; } .shades-container { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>

    <header>
        <div class="header-title">
            <h1>Flat UI Colors<span class="version-badge">v10.0</span></h1>
            <p>Klik: Copy | Klik Kanan: Favorites | Ikon 🔍: Studio</p>
        </div>
        <div class="controls">
            <button id="gradient-toggle">🌈 Gradient: OFF</button>
            <button id="eyedropper-btn" title="Pick color from screen">💉 Screen Picker</button>
            <button id="theme-toggle">🌙 Dark</button>
            <button id="sound-toggle">🔊 Sound</button>
            <button id="history-toggle">🕒 History</button>
            <button id="export-css">💾 Export CSS</button>
            <select id="palette-selector">
                <option value="flat-v1">Flat UI v1</option>
                <option value="aussie">Aussie Palette</option>
                <option value="favorites">⭐ Favorites</option>
            </select>
            <select id="format-selector">
                <option value="hex">HEX</option>
                <option value="rgb">RGB</option>
                <option value="hsl">HSL</option>
                <option value="tailwind">Tailwind</option>
            </select>
        </div>
    </header>

    <div class="palette" id="palette"></div>

    <div class="overlay" id="overlay">
        <div class="overlay-strip" id="overlay-strip"><h1 id="overlay-msg">COPIED!</h1></div>
        <p id="copied-text">#000000</p>
    </div>

    <div class="gradient-result-modal" id="gradient-modal">
        <button class="close-grad-btn" id="close-gradient">&times;</button>
        <div class="gradient-code-box">
            <h2>Gradient Created! 🎉</h2>
            <code id="gradient-code-text">background: linear-gradient(135deg, #1abc9c, #2ecc71);</code>
            <button class="copy-grad-btn" id="copy-gradient-btn">Copy CSS</button>
        </div>
    </div>

    <div class="history-backdrop" id="history-backdrop"></div>
    <div class="history-panel" id="history-panel">
        <div class="history-header"><h2>Copy History</h2><button class="close-btn" id="close-history">&times;</button></div>
        <div class="history-list" id="history-list"></div>
        <button class="clear-history-btn" id="clear-history">Clear History</button>
    </div>

    <div class="shades-modal" id="shades-modal">
        <div class="shades-header">
            <div class="shades-info">
                <h2 id="shade-title">Color Studio</h2>
                <div><span class="wcag-badge" id="wcag-white">Putih: ...</span> <span class="wcag-badge" id="wcag-black">Hitam: ...</span></div>
            </div>
            <button class="close-btn" id="close-shades" style="font-size: 2rem;">&times;</button>
        </div>
        <h2 class="studio-section-title">1. Tints & Shades</h2>
        <div class="shades-container" id="shades-container"></div>
        <h2 class="studio-section-title">2. Color Harmonies</h2>
        <div class="harmonies-container" id="harmonies-container"></div>
    </div>

    <script>
        let savedFavorites = JSON.parse(localStorage.getItem('fui_favorites')) || [];
        let copyHistory = JSON.parse(localStorage.getItem('fui_history')) || [];
        let savedFormat = localStorage.getItem('fui_format') || 'hex';
        let savedPalette = localStorage.getItem('fui_palette') || 'flat-v1';
        let isSoundMuted = localStorage.getItem('fui_muted') === 'true';
        let isDarkMode = localStorage.getItem('fui_darkmode') === 'true';

        // Gradient State
        let isGradientMode = false;
        let selectedGradientColors = [];

        if (isDarkMode) document.body.classList.add('dark-mode');

        const palettes = {
            "flat-v1": [{ name: "Turquoise", hex: "#1abc9c" }, { name: "Emerald", hex: "#2ecc71" }, { name: "Peter River", hex: "#3498db" }, { name: "Amethyst", hex: "#9b59b6" }, { name: "Wet Asphalt", hex: "#34495e" }, { name: "Green Sea", hex: "#16a085" }, { name: "Nephritis", hex: "#27ae60" }, { name: "Belize Hole", hex: "#2980b9" }, { name: "Wisteria", hex: "#8e44ad" }, { name: "Midnight Blue", hex: "#2c3e50" }, { name: "Sun Flower", hex: "#f1c40f" }, { name: "Carrot", hex: "#e67e22" }, { name: "Alizarin", hex: "#e74c3c" }, { name: "Clouds", hex: "#ecf0f1" }, { name: "Concrete", hex: "#95a5a6" }],
            "aussie": [{ name: "Beekeeper", hex: "#f6e58d" }, { name: "Spiced Nectarine", hex: "#ffbe76" }, { name: "Pink Glamour", hex: "#ff7979" }, { name: "June Bud", hex: "#badc58" }, { name: "Coastal Breeze", hex: "#dff9fb" }, { name: "Turbo", hex: "#f9ca24" }, { name: "Quince Jelly", hex: "#f0932b" }, { name: "Carmine Pink", hex: "#eb4d4b" }, { name: "Pure Apple", hex: "#6ab04c" }, { name: "Hint Of Ice Pack", hex: "#c7ecee" }, { name: "Middle Blue", hex: "#7ed6df" }, { name: "Heliotrope", hex: "#e056fd" }, { name: "Exodus Fruit", hex: "#686de0" }, { name: "Deep Koamaru", hex: "#30336b" }, { name: "Soaring Eagle", hex: "#95afc0" }],
            "favorites": savedFavorites
        };
        const funMessages = ["COPIED!", "PASTE ME!", "IT'LL ROCK!", "GOT IT!", "PERFECT!", "MAGIC!"];

        const paletteContainer = document.getElementById('palette');
        const overlay = document.getElementById('overlay');
        const formatSelector = document.getElementById('format-selector');
        const paletteSelector = document.getElementById('palette-selector');
        const gradToggleBtn = document.getElementById('gradient-toggle');
        
        formatSelector.value = savedFormat; paletteSelector.value = savedPalette;
        document.getElementById('sound-toggle').innerText = isSoundMuted ? "🔇 Muted" : "🔊 Sound";
        document.getElementById('theme-toggle').innerText = isDarkMode ? "☀️ Light" : "🌙 Dark";

        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;
        function playPopSound() {
            if (isSoundMuted) return; 
            if (!audioCtx) audioCtx = new AudioContext(); if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator(), gain = audioCtx.createGain(); osc.type = 'sine'; osc.frequency.setValueAtTime(800, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(300, audioCtx.currentTime + 0.1); gain.gain.setValueAtTime(0.5, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1); osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        }

        // Toggles
        document.getElementById('theme-toggle').addEventListener('click', (e) => { isDarkMode = !isDarkMode; document.body.classList.toggle('dark-mode', isDarkMode); e.target.innerText = isDarkMode ? "☀️ Light" : "🌙 Dark"; localStorage.setItem('fui_darkmode', isDarkMode); });
        document.getElementById('sound-toggle').addEventListener('click', (e) => { isSoundMuted = !isSoundMuted; e.target.innerText = isSoundMuted ? "🔇 Muted" : "🔊 Sound"; localStorage.setItem('fui_muted', isSoundMuted); });

        // Gradient Toggles
        gradToggleBtn.addEventListener('click', () => {
            isGradientMode = !isGradientMode;
            selectedGradientColors = []; // reset
            if(isGradientMode) {
                gradToggleBtn.innerText = "🌈 Gradient: ON (Pick 2)";
                gradToggleBtn.classList.add('active');
            } else {
                gradToggleBtn.innerText = "🌈 Gradient: OFF";
                gradToggleBtn.classList.remove('active');
            }
        });

        // Eyedropper
        const eyeDropperBtn = document.getElementById('eyedropper-btn');
        if ('EyeDropper' in window) {
            eyeDropperBtn.style.display = 'block';
            eyeDropperBtn.addEventListener('click', async () => {
                const eyeDropper = new EyeDropper();
                try {
                    const result = await eyeDropper.open();
                    handleColorClick("Screen Pick", result.sRGBHex);
                } catch (e) {}
            });
        }

        // Math
        function isLightColor(hex) { let r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16); return (((r * 299) + (g * 587) + (b * 114)) / 1000) >= 128; }
        function getLuminance(r, g, b) { let a = [r, g, b].map(v => { v /= 255; return v <= 0.03928 ? v / 12.92 : Math.pow((v + 0.055) / 1.055, 2.4); }); return a[0] * 0.2126 + a[1] * 0.7152 + a[2] * 0.0722; }
        function getContrastRatio(hex1, hex2) { let rgb1 = [parseInt(hex1.slice(1,3),16), parseInt(hex1.slice(3,5),16), parseInt(hex1.slice(5,7),16)]; let rgb2 = [parseInt(hex2.slice(1,3),16), parseInt(hex2.slice(3,5),16), parseInt(hex2.slice(5,7),16)]; let lum1 = getLuminance(...rgb1); let lum2 = getLuminance(...rgb2); let brightest = Math.max(lum1, lum2); let darkest = Math.min(lum1, lum2); return (brightest + 0.05) / (darkest + 0.05); }
        function hexToRgb(hex) { return `rgb(${parseInt(hex.slice(1, 3), 16)}, ${parseInt(hex.slice(3, 5), 16)}, ${parseInt(hex.slice(5, 7), 16)})`; }
        function hexToHsl(hex) { let r = parseInt(hex.slice(1, 3), 16)/255, g = parseInt(hex.slice(3, 5), 16)/255, b = parseInt(hex.slice(5, 7), 16)/255; let max = Math.max(r, g, b), min = Math.min(r, g, b); let h, s, l = (max + min) / 2; if (max === min) h = s = 0; else { let d = max - min; s = l > 0.5 ? d / (2 - max - min) : d / (max + min); switch (max) { case r: h = (g - b) / d + (g < b ? 6 : 0); break; case g: h = (b - r) / d + 2; break; case b: h = (r - g) / d + 4; break; } h /= 6; } return {h: Math.round(h*360), s: Math.round(s*100), l: Math.round(l*100), str: `hsl(${Math.round(h*360)}, ${Math.round(s*100)}%, ${Math.round(l*100)}%)`}; }
        function hslToHex(h, s, l) { l /= 100; const a = s * Math.min(l, 1 - l) / 100; const f = n => { const k = (n + h / 30) % 12; const color = l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1); return Math.round(255 * color).toString(16).padStart(2, '0'); }; return `#${f(0)}${f(8)}${f(4)}`; }

        // Click Handler (Routes to Copy or Gradient Builder)
        function handleColorClick(name, hex) {
            if(isGradientMode) {
                selectedGradientColors.push(hex);
                gradToggleBtn.innerText = `🌈 Pick 1 more...`;
                if(selectedGradientColors.length === 2) {
                    showGradientResult(selectedGradientColors[0], selectedGradientColors[1]);
                    selectedGradientColors = []; // reset
                    gradToggleBtn.innerText = "🌈 Gradient: ON (Pick 2)";
                }
                playPopSound();
                return;
            }

            // Normal Copy Mode
            let val = hex.toUpperCase(); 
            if (formatSelector.value === 'rgb') val = hexToRgb(hex); 
            else if (formatSelector.value === 'hsl') val = hexToHsl(hex).str;
            else if (formatSelector.value === 'tailwind') val = `bg-[${hex.toLowerCase()}]`;

            executeCopy(name, hex, val);
        }

        // Gradient Modal Logic
        const gradModal = document.getElementById('gradient-modal');
        const gradCodeText = document.getElementById('gradient-code-text');
        
        function showGradientResult(color1, color2) {
            const cssString = `background: linear-gradient(135deg, ${color1}, ${color2});`;
            gradModal.style.background = `linear-gradient(135deg, ${color1}, ${color2})`;
            gradCodeText.innerText = cssString;
            gradModal.classList.add('show');
        }

        document.getElementById('close-gradient').addEventListener('click', () => gradModal.classList.remove('show'));
        document.getElementById('copy-gradient-btn').addEventListener('click', () => {
            navigator.clipboard.writeText(gradCodeText.innerText);
            document.getElementById('copy-gradient-btn').innerText = "Copied! ✔️";
            setTimeout(() => {
                document.getElementById('copy-gradient-btn').innerText = "Copy CSS";
                gradModal.classList.remove('show');
            }, 1000);
        });


        // Copy Engine & History
        function executeCopy(name, hex, valueToCopy, fromHistory = false) {
            playPopSound(); navigator.clipboard.writeText(valueToCopy);
            
            const isLight = isLightColor(hex); overlay.style.backgroundColor = hex;
            document.getElementById('overlay-msg').innerText = funMessages[Math.floor(Math.random() * funMessages.length)];
            document.getElementById('copied-text').innerText = valueToCopy;
            const tColor = isLight ? '#333333' : '#ffffff';
            document.getElementById('overlay-msg').style.color = tColor; document.getElementById('copied-text').style.color = tColor;
            
            const strip = document.getElementById('overlay-strip');
            if (isLight) { strip.classList.add('dark-strip'); document.getElementById('overlay-msg').style.textShadow = 'none'; }
            else { strip.classList.remove('dark-strip'); document.getElementById('overlay-msg').style.textShadow = '2px 2px 4px rgba(0,0,0,0.2)'; }
            
            overlay.classList.add('show'); setTimeout(() => overlay.classList.remove('show'), 1200);

            copyHistory = copyHistory.filter(item => item.value !== valueToCopy);
            copyHistory.unshift({ name, hex, value: valueToCopy });
            if (copyHistory.length > 20) copyHistory.pop();
            localStorage.setItem('fui_history', JSON.stringify(copyHistory));
            if(fromHistory) setTimeout(renderHistory, 100);
        }

        document.getElementById('history-toggle').addEventListener('click', () => { document.getElementById('history-panel').classList.add('open'); document.getElementById('history-backdrop').classList.add('open'); renderHistory(); });
        function closeHistory() { document.getElementById('history-panel').classList.remove('open'); document.getElementById('history-backdrop').classList.remove('open'); }
        document.getElementById('close-history').addEventListener('click', closeHistory); document.getElementById('history-backdrop').addEventListener('click', closeHistory);
        document.getElementById('clear-history').addEventListener('click', () => { copyHistory = []; localStorage.setItem('fui_history', '[]'); renderHistory(); });

        function renderHistory() {
            const list = document.getElementById('history-list'); list.innerHTML = '';
            if (!copyHistory.length) return list.innerHTML = `<p style="text-align:center; color:var(--empty-text); margin-top:20px;">Belum ada riwayat.</p>`;
            copyHistory.forEach(item => {
                const div = document.createElement('div'); div.classList.add('history-item');
                div.innerHTML = `<div class="history-color-blob" style="background-color: ${item.hex}"></div><div class="history-info"><span class="history-val">${item.value}</span><span class="history-name">${item.name}</span></div>`;
                div.addEventListener('click', () => executeCopy(item.name, item.hex, item.value, true)); list.appendChild(div);
            });
        }

        // Studio Setup
        const shadesModal = document.getElementById('shades-modal');
        document.getElementById('close-shades').addEventListener('click', () => shadesModal.classList.remove('open'));
        function createHarmonyBox(hex, label) {
            const box = document.createElement('div'); box.className = 'harmony-box'; box.style.backgroundColor = hex;
            const span = document.createElement('span'); span.className = 'harmony-label'; span.innerText = hex.toUpperCase(); box.appendChild(span);
            box.addEventListener('click', () => handleColorClick(`Harmony: ${label}`, hex)); return box;
        }

        function openColorStudio(colorName, hex) {
            document.getElementById('shade-title').innerText = `🎨 Studio: ${colorName}`;
            const crW = getContrastRatio(hex, '#ffffff'), crB = getContrastRatio(hex, '#000000');
            const badgeW = document.getElementById('wcag-white'); badgeW.innerText = `Putih: ${crW >= 4.5 ? 'Aman' : 'Gagal'}`; badgeW.className = crW >= 4.5 ? 'wcag-badge wcag-pass' : 'wcag-badge wcag-fail';
            const badgeB = document.getElementById('wcag-black'); badgeB.innerText = `Hitam: ${crB >= 4.5 ? 'Aman' : 'Gagal'}`; badgeB.className = crB >= 4.5 ? 'wcag-badge wcag-pass' : 'wcag-badge wcag-fail';

            const tContainer = document.getElementById('shades-container'); tContainer.innerHTML = '';
            const hsl = hexToHsl(hex);
            for(let i = 1; i <= 10; i++) {
                let l = 100 - (i * 9); let newHex = hslToHex(hsl.h, hsl.s, l);
                const box = document.createElement('div'); box.className = 'shade-box'; box.style.backgroundColor = newHex; box.style.color = isLightColor(newHex) ? '#000' : '#fff';
                box.innerHTML = `<span class="shade-pct">${l}%</span><span class="shade-hex">${newHex.toUpperCase()}</span>`;
                box.addEventListener('click', () => handleColorClick(`${colorName} (${l}%)`, newHex));
                tContainer.appendChild(box);
            }

            const hContainer = document.getElementById('harmonies-container'); hContainer.innerHTML = '';
            const compHex = hslToHex((hsl.h + 180) % 360, hsl.s, hsl.l); const compGroup = document.createElement('div'); compGroup.className = 'harmony-group'; compGroup.innerHTML = `<h3>Complementary (Kontras)</h3><div class="harmony-colors" id="hc-comp"></div>`; hContainer.appendChild(compGroup); document.getElementById('hc-comp').append(createHarmonyBox(hex, 'Base'), createHarmonyBox(compHex, 'Complement'));
            const ana1 = hslToHex((hsl.h + 30) % 360, hsl.s, hsl.l), ana2 = hslToHex((hsl.h - 30 + 360) % 360, hsl.s, hsl.l); const anaGroup = document.createElement('div'); anaGroup.className = 'harmony-group'; anaGroup.innerHTML = `<h3>Analogous (Senada)</h3><div class="harmony-colors" id="hc-ana"></div>`; hContainer.appendChild(anaGroup); document.getElementById('hc-ana').append(createHarmonyBox(ana2, 'Analogous'), createHarmonyBox(hex, 'Base'), createHarmonyBox(ana1, 'Analogous'));
            const tri1 = hslToHex((hsl.h + 120) % 360, hsl.s, hsl.l), tri2 = hslToHex((hsl.h + 240) % 360, hsl.s, hsl.l); const triGroup = document.createElement('div'); triGroup.className = 'harmony-group'; triGroup.innerHTML = `<h3>Triadic (Dinamis)</h3><div class="harmony-colors" id="hc-tri"></div>`; hContainer.appendChild(triGroup); document.getElementById('hc-tri').append(createHarmonyBox(hex, 'Base'), createHarmonyBox(tri1, 'Triad 1'), createHarmonyBox(tri2, 'Triad 2'));

            shadesModal.classList.add('open');
        }

        // Main Render
        function renderPalette(key) {
            paletteContainer.innerHTML = ''; const colors = palettes[key];
            if (key === 'favorites') {
                const addBox = document.createElement('div'); addBox.className = 'color-box add-color-box';
                addBox.innerHTML = `<span class="color-name">+ ADD COLOR</span><input type="color" id="custom-color-picker">`;
                addBox.querySelector('input').addEventListener('input', (e) => {
                    let n = prompt("Beri nama untuk warna ini:", "Custom Color");
                    if (n !== null) { palettes['favorites'].push({ name: n.trim() || "Custom", hex: e.target.value }); localStorage.setItem('fui_favorites', JSON.stringify(palettes['favorites'])); renderPalette('favorites'); }
                });
                paletteContainer.appendChild(addBox);
            }
            if (key === 'favorites' && colors.length === 0) { paletteContainer.innerHTML += `<div class="empty-favorites">Klik kanan warna, atau klik + ADD COLOR!</div>`; return; }

            colors.forEach(color => {
                const box = document.createElement('div'); box.className = 'color-box'; box.style.backgroundColor = color.hex;
                const name = document.createElement('span'); name.className = 'color-name'; name.innerText = color.name;
                const isLight = isLightColor(color.hex); name.style.color = isLight ? 'rgba(0,0,0,0.7)' : 'rgba(255,255,255,0.9)';

                const tintsBtn = document.createElement('button'); tintsBtn.className = `tints-btn ${isLight ? 'dark-btn' : ''}`; tintsBtn.innerText = '🔍 Studio'; tintsBtn.title = "Buka Color Studio";
                tintsBtn.addEventListener('click', (e) => { e.stopPropagation(); openColorStudio(color.name, color.hex); });

                box.append(name, tintsBtn);
                box.addEventListener('click', (e) => {
                    if(e.target.tagName.toLowerCase() === 'input' || e.target.tagName.toLowerCase() === 'button') return;
                    handleColorClick(color.name, color.hex);
                });
                box.addEventListener('contextmenu', (e) => {
                    e.preventDefault(); const idx = palettes['favorites'].findIndex(c => c.hex === color.hex);
                    if (idx > -1) { palettes['favorites'].splice(idx, 1); name.innerText = "REMOVED"; } else { palettes['favorites'].push(color); name.innerText = "⭐ ADDED"; }
                    localStorage.setItem('fui_favorites', JSON.stringify(palettes['favorites']));
                    setTimeout(() => name.innerText = color.name, 1000); if (paletteSelector.value === 'favorites') setTimeout(() => renderPalette('favorites'), 500);
                });
                paletteContainer.appendChild(box);
            });
        }

        document.getElementById('export-css').addEventListener('click', () => {
            const colors = palettes[paletteSelector.value]; if (!colors.length) return alert("Palette kosong!");
            let css = `/* Generated from Flat UI v10.0 */\n:root {\n`;
            colors.forEach((c, i) => { css += `  --color-${(c.name.toLowerCase().replace(/[^a-z0-9]+/g, '-') || `color-${i}`)}: ${c.hex};\n`; }); css += `}\n`;
            const link = document.createElement('a'); link.href = URL.createObjectURL(new Blob([css], { type: 'text/css' }));
            link.download = `${paletteSelector.value}-palette.css`; link.click();
        });

        formatSelector.addEventListener('change', e => localStorage.setItem('fui_format', e.target.value));
        paletteSelector.addEventListener('change', e => { localStorage.setItem('fui_palette', e.target.value); renderPalette(e.target.value); });
        
        renderPalette(savedPalette);
    </script>
</body>
</html>
